<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Infinite with Bedrock</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', monospace; user-select: none; }
        
        #f3-menu {
            position: absolute; top: 0; left: 0; color: #ddd; background: rgba(0, 0, 0, 0.5);
            padding: 10px; font-size: 14px; pointer-events: none; display: none; z-index: 20; line-height: 1.4;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); mix-blend-mode: difference;
        }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }

        #hotbar-container {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(30, 30, 30, 0.7); border: 2px solid #111; padding: 2px; gap: 2px; z-index: 10;
        }
        .hotbar-slot {
            width: 44px; height: 44px; background: rgba(139, 139, 139, 0.8); border: 2px solid #555;
            display: flex; align-items: center; justify-content: center; box-shadow: inset 2px 2px 0px rgba(255,255,255,0.4), inset -2px -2px 0px rgba(0,0,0,0.4);
        }
        .hotbar-slot.selected { border: 2px solid white; box-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .hotbar-slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }

        #pause-menu {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 50; cursor: pointer;
        }
        .title { font-size: 40px; margin-bottom: 20px; color: #fff; text-shadow: 3px 3px 0 #000; }
        .btn { padding: 10px 40px; background: #c6c6c6; border: 2px solid #000; border-top-color: #fff; border-left-color: #fff; color: #000; font-size: 20px; }
        .btn:hover { background: #9999ff; }
        .loading { font-size: 16px; color: #aaa; margin-top: 15px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="f3-menu">
        Minecraft Infinite Web Clone<br>FPS: <span id="fps-counter">0</span><br>
        Active Blocks: <span id="block-counter">0</span><br><br>
        XYZ: <span id="debug-xyz">0 / 0 / 0</span><br>
        Targeted Block: <span id="debug-target">None</span>
    </div>
    <div id="crosshair"></div>
    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-1"></div>
        <div class="hotbar-slot" id="slot-2"></div>
        <div class="hotbar-slot" id="slot-3"></div>
        <div class="hotbar-slot" id="slot-4"></div>
        <div class="hotbar-slot" id="slot-5"></div>
    </div>
    <div id="pause-menu">
        <div class="title">Game Menu</div>
        <div class="btn">Back to Game</div>
        <p class="loading">進入遊戲後，往下挖即可看到「無法破壞的基岩層」！</p>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 60); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 1. 像素材質生成器 (新增基岩) ---
        function generateTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');

            function drawNoise(base, variance) {
                ctx.fillStyle = base; ctx.fillRect(0, 0, 16, 16);
                for(let i=0; i<256; i++) {
                    const r = Math.random() * variance - variance/2;
                    ctx.fillStyle = `rgba(0,0,0,${Math.abs(r)})`;
                    ctx.fillRect(i%16, Math.floor(i/16), 1, 1);
                }
            }

            if (type === 'dirt') drawNoise('#684A33', 0.2);
            else if (type === 'grass_top') drawNoise('#5B8731', 0.15);
            else if (type === 'grass_side') {
                drawNoise('#684A33', 0.2);
                ctx.fillStyle = '#5B8731';
                for(let x=0; x<16; x++) ctx.fillRect(x, 0, 1, 3 + Math.floor(Math.random()*3));
            }
            else if (type === 'stone') drawNoise('#7D7D7D', 0.1);
            else if (type === 'wood') {
                drawNoise('#9A7441', 0.1);
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for(let x=0; x<16; x+=4) ctx.fillRect(x, 0, 1, 16);
            }
            else if (type === 'glass') {
                ctx.fillStyle = 'rgba(200, 240, 255, 0.3)'; ctx.fillRect(0, 0, 16, 16);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.fillRect(1, 1, 14, 1); ctx.fillRect(1, 1, 1, 14);
            }
            // 🔥 基岩材質：深灰色基底配上黑色顆粒紋路
            else if (type === 'bedrock') {
                drawNoise('#2e2e2e', 0.4);
                ctx.fillStyle = '#141414';
                for(let i=0; i<25; i++) {
                    ctx.fillRect(Math.floor(Math.random()*15), Math.floor(Math.random()*15), 2, 2);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; 
            return { tex: texture, canvas: canvas };
        }

        const texDirt = generateTexture('dirt').tex;
        const matDirt = new THREE.MeshStandardMaterial({ map: texDirt });
        const matGrassBlock = [
            new THREE.MeshStandardMaterial({ map: generateTexture('grass_side').tex }),
            new THREE.MeshStandardMaterial({ map: generateTexture('grass_side').tex }),
            new THREE.MeshStandardMaterial({ map: generateTexture('grass_top').tex }),
            matDirt,
            new THREE.MeshStandardMaterial({ map: generateTexture('grass_side').tex }),
            new THREE.MeshStandardMaterial({ map: generateTexture('grass_side').tex })
        ];

        const materialsDict = {
            1: { mat: matGrassBlock, name: "Grass Block", thumb: generateTexture('grass_side').canvas },
            2: { mat: matDirt, name: "Dirt", thumb: generateTexture('dirt').canvas },
            3: { mat: new THREE.MeshStandardMaterial({ map: generateTexture('stone').tex }), name: "Stone", thumb: generateTexture('stone').canvas },
            4: { mat: new THREE.MeshStandardMaterial({ map: generateTexture('wood').tex }), name: "Wooden Planks", thumb: generateTexture('wood').canvas },
            5: { mat: new THREE.MeshStandardMaterial({ map: generateTexture('glass').tex, transparent: true, opacity: 0.8 }), name: "Glass", thumb: generateTexture('glass').canvas },
            6: { mat: new THREE.MeshStandardMaterial({ map: generateTexture('bedrock').tex }), name: "Bedrock" } // 系統內部代碼 6 為基岩
        };

        for(let i=1; i<=5; i++) document.getElementById('slot-'+i).appendChild(materialsDict[i].thumb);

        // --- 2. 無限地形與地底基岩系統 ---
        const BLOCK_SIZE = 2;
        const worldBlocks = [];
        const worldMap = new Map(); 
        const generatedColumns = new Set(); 
        const blockGeometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        
        const RENDER_RADIUS = 18; 

        function getBlockKey(x, y, z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

        function createBlock(x, y, z, typeId) {
            const key = getBlockKey(x, y, z);
            if (worldMap.has(key)) return; 

            const block = new THREE.Mesh(blockGeometry, materialsDict[typeId].mat);
            block.position.set(x, y, z);
            block.castShadow = true; block.receiveShadow = true;
            block.userData = { typeId: typeId, name: materialsDict[typeId].name };
            
            scene.add(block);
            worldBlocks.push(block);
            worldMap.set(key, block);
        }

        function updateTerrain() {
            const px = Math.round(controls.getObject().position.x / BLOCK_SIZE);
            const pz = Math.round(controls.getObject().position.z / BLOCK_SIZE);

            for (let x = px - RENDER_RADIUS; x <= px + RENDER_RADIUS; x++) {
                for (let z = pz - RENDER_RADIUS; z <= pz + RENDER_RADIUS; z++) {
                    const colKey = `${x},${z}`;
                    
                    if (!generatedColumns.has(colKey)) {
                        generatedColumns.add(colKey);
                        
                        let height = Math.floor((Math.sin(x/8) + Math.cos(z/10) + Math.sin((x+z)/14)) * 2.5);
                        
                        // 生成地層結構
                        createBlock(x * BLOCK_SIZE, height * BLOCK_SIZE, z * BLOCK_SIZE, 1);     // 地表：草地
                        createBlock(x * BLOCK_SIZE, (height - 1) * BLOCK_SIZE, z * BLOCK_SIZE, 2); // 中層：泥土
                        createBlock(x * BLOCK_SIZE, (height - 2) * BLOCK_SIZE, z * BLOCK_SIZE, 3); // 深層：石頭
                        
                        // 🔥 關鍵：在石頭下方直接鋪上一層「基岩 (TypeID: 6)」
                        createBlock(x * BLOCK_SIZE, (height - 3) * BLOCK_SIZE, z * BLOCK_SIZE, 6); 
                    }
                }
            }

            let activeCount = 0;
            worldMap.forEach((block) => {
                const dist = Math.sqrt(Math.pow(block.position.x/BLOCK_SIZE - px, 2) + Math.pow(block.position.z/BLOCK_SIZE - pz, 2));
                if (dist > RENDER_RADIUS) {
                    block.visible = false;
                } else {
                    block.visible = true;
                    activeCount++;
                }
            });
            document.getElementById('block-counter').innerText = activeCount;
        }

        const outlineGeo = new THREE.EdgesGeometry(blockGeometry);
        const outlineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const highlightBox = new THREE.LineSegments(outlineGeo, outlineMat);
        highlightBox.visible = false;
        scene.add(highlightBox);

        // --- 3. 玩家控制 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const pauseMenu = document.getElementById('pause-menu');

        pauseMenu.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => pauseMenu.style.display = 'none');
        controls.addEventListener('unlock', () => pauseMenu.style.display = 'flex');
        scene.add(controls.getObject());

        controls.getObject().position.set(0, 30, 0); 

        const move = { forward: false, backward: false, left: false, right: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let canJump = false;
        let selectedSlot = 1;
        let showF3 = false;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') move.forward = true;
            if (e.code === 'KeyS') move.backward = true;
            if (e.code === 'KeyA') move.left = true;
            if (e.code === 'KeyD') move.right = true;
            if (e.code === 'Space' && canJump) { velocity.y = 12; canJump = false; }
            if (e.code === 'F3') { e.preventDefault(); showF3 = !showF3; document.getElementById('f3-menu').style.display = showF3 ? 'block' : 'none'; }
            if (['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5'].includes(e.code)) {
                selectedSlot = parseInt(e.key);
                for(let i=1; i<=5; i++) document.getElementById('slot-'+i).classList.remove('selected');
                document.getElementById('slot-'+selectedSlot).classList.add('selected');
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') move.forward = false;
            if (e.code === 'KeyS') move.backward = false;
            if (e.code === 'KeyA') move.left = false;
            if (e.code === 'KeyD') move.right = false;
        });

        // 互動：破壞與放置
        const raycaster = new THREE.Raycaster();
        const centerMouse = new THREE.Vector2(0, 0);

        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(centerMouse, camera);
            raycaster.far = 10;
            const intersects = raycaster.intersectObjects(worldBlocks.filter(b => b.visible)); 

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (e.button === 0) { 
                    // 🔥 核心防護：如果點到的是基岩 (typeId === 6)，直接攔截，不允許刪除！
                    if (intersect.object.userData.typeId === 6) {
                        console.log("基岩是無法被破壞的！");
                        return; 
                    }

                    scene.remove(intersect.object);
                    const index = worldBlocks.indexOf(intersect.object);
                    if (index > -1) worldBlocks.splice(index, 1);
                    worldMap.delete(getBlockKey(intersect.object.position.x, intersect.object.position.y, intersect.object.position.z));
                    highlightBox.visible = false;
                } else if (e.button === 2) { 
                    const normal = intersect.face.normal;
                    const newPos = intersect.object.position.clone().add(normal.clone().multiplyScalar(BLOCK_SIZE));
                    const pPos = controls.getObject().position;
                    if (Math.abs(newPos.x - pPos.x) < 1.5 && Math.abs(newPos.z - pPos.z) < 1.5 && newPos.y > pPos.y - 3 && newPos.y < pPos.y + 1) return;
                    createBlock(newPos.x, newPos.y, newPos.z, selectedSlot);
                    generatedColumns.add(`${Math.round(newPos.x/BLOCK_SIZE)},${Math.round(newPos.z/BLOCK_SIZE)}`);
                }
            }
        });

        // --- 4. 遊戲主迴圈 ---
        const clock = new THREE.Clock();
        const downRay = new THREE.Raycaster(); 
        let frames = 0, lastTime = performance.now();

        updateTerrain();

        function animate() {
            requestAnimationFrame(animate);

            frames++; const timeNow = performance.now();
            if (timeNow >= lastTime + 1000) { document.getElementById('fps-counter').innerText = frames; frames = 0; lastTime = timeNow; }

            if (frames % 10 === 0 && controls.isLocked) {
                updateTerrain();
            }

            if (controls.isLocked) {
                const delta = Math.min(clock.getDelta(), 0.1); 
                const playerObj = controls.getObject();

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize();

                const speed = 100.0;
                if (move.forward || move.backward) velocity.z -= direction.z * speed * delta;
                if (move.left || move.right) velocity.x -= direction.x * speed * delta;

                // 防穿牆
                const nextX = playerObj.position.x - velocity.x * delta;
                const nextZ = playerObj.position.z - velocity.z * delta;
                const bodyY1 = playerObj.position.y - 1.5; 
                const bodyY2 = playerObj.position.y - 0.5; 

                function isWall(x, y, z) {
                    const bx = Math.round(x / BLOCK_SIZE) * BLOCK_SIZE;
                    const by = Math.round(y / BLOCK_SIZE) * BLOCK_SIZE;
                    const bz = Math.round(z / BLOCK_SIZE) * BLOCK_SIZE;
                    return worldMap.has(getBlockKey(bx, by, bz));
                }

                if (!isWall(nextX, bodyY1, playerObj.position.z) && !isWall(nextX, bodyY2, playerObj.position.z)) {
                    controls.moveRight(-velocity.x * delta);
                }
                if (!isWall(playerObj.position.x, bodyY1, nextZ) && !isWall(playerObj.position.x, bodyY2, nextZ)) {
                    controls.moveForward(-velocity.z * delta);
                }

                velocity.y -= 9.8 * 4.0 * delta; 
                playerObj.position.y += velocity.y * delta;

                // 地板與基岩碰撞偵測 (站立在基岩上)
                downRay.set(playerObj.position, new THREE.Vector3(0, -1, 0));
                downRay.far = 10;
                const floorIntersects = downRay.intersectObjects(worldBlocks.filter(b => b.visible));
                
                canJump = false;
                if (floorIntersects.length > 0) {
                    const floorY = floorIntersects[0].point.y;
                    if (playerObj.position.y <= floorY + 3) {
                        velocity.y = Math.max(0, velocity.y); 
                        playerObj.position.y = floorY + 3;
                        canJump = true;
                    }
                }

                // 虛空保護 (以防萬一卡 Bug 穿過基岩)
                if (playerObj.position.y < -40) {
                    velocity.y = 0; 
                    playerObj.position.y = 30; 
                }

                raycaster.setFromCamera(centerMouse, camera);
                raycaster.far = 10;
                const intersects = raycaster.intersectObjects(worldBlocks.filter(b => b.visible));
                if (intersects.length > 0) {
                    highlightBox.position.copy(intersects[0].object.position);
                    highlightBox.visible = true;
                    if (showF3) document.getElementById('debug-target').innerText = intersects[0].object.userData.name;
                } else {
                    highlightBox.visible = false;
                    if (showF3) document.getElementById('debug-target').innerText = "None";
                }

                if (showF3) {
                    document.getElementById('debug-xyz').innerText = `${playerObj.position.x.toFixed(1)} / ${playerObj.position.y.toFixed(1)} / ${playerObj.position.z.toFixed(1)}`;
                }
            }
            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
